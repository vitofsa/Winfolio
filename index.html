<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitor F. Sa</title>
    <link rel="stylesheet" href="./assets/css/style.css"/>
    <link rel="stylesheet" href="./assets/css/aero.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="container-fluid px-0 px-md-3 d-block d-md-flex align-items-center">
    <div class="f-aero-view container-fluid col-12 col-md-8 mx-0 mx-md-auto text-light">
        <!-- Header  -->
        <header class="f-aero-header row d-flex flex-wrap align-items-center justify-content-between">
            <img class="col-2 col-md-1" src="https://avatars.githubusercontent.com/u/53355703?v=4" alt="Meu perfil">
            <div class="col-11 d-flex flex-column justify-content-center d-none d-md-block">
                <h1>Winfólio</h1>
                <h2>Um portfólio tematizado com Frutiger Aero</h2>
            </div>
            <a class="col-2 d-block d-md-none" href="">
                <img class="img-fluid rounded-0 p-2" src="./assets/imgs/icons/menu-icon.png" alt="ícone do menu">
            </a>
        </header>

        <!-- Conteúdo principal -->
        <div class="f-aero-main row">
            <aside class="f-aero-menu d-none d-md-block col-2"></aside>
            <main class="f-aero-content col-12 col-md-10">
                <header>
                    <h1 class="f-aero-heading">Sobre mim</h1>
                </header>
                <div class="f-aero-container">
                    <section>
                        <p>
                            Eu sou um texto muito massa sobre mim
                        </p>
                    </section>
                </div>
                <div class="f-aero-container">
                    <section>
                        <header>
                            <h1 class="f-aero-heading">Informações adicionais</h1>
                        </header>
                        <div class="d-flex row">
                            <img class="col-4 col-md-3 position-absolute" src="./assets/imgs/user-frame.png" alt="janela da foto de perfil">
                            <div class="col-4 col-md-3 py-3 px-4">
                                <img class="col-12" src="https://avatars.githubusercontent.com/u/53355703?v=4" alt="foto de perfil">
                            </div>
                            <p class="col-8 col-md-8">
                                Alguns tópicos aqui e lá
                            </p>
                        </div>
                    </section>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
